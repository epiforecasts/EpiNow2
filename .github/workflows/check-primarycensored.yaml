# Check that vendored primarycensored Stan functions are up to date
# with the latest CRAN version. Opens a PR if they are not.
on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

name: Check vendored primarycensored

permissions:
  contents: write
  pull-requests: write

jobs:
  check-primarycensored:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check if update needed
        id: check-version
        run: |
          vendored_version=$(head -1 inst/stan/functions/primarycensored.stan | grep -oP '[\d.]+$')
          cran_version=$(curl -s https://cran.r-project.org/package=primarycensored | grep -oP 'Version:</td>\s*<td>\K[^<]+')
          echo "vendored=$vendored_version" >> "$GITHUB_OUTPUT"
          echo "cran=$cran_version" >> "$GITHUB_OUTPUT"
          if [ "$vendored_version" = "$cran_version" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Vendored version $vendored_version matches CRAN"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Vendored version $vendored_version != CRAN version $cran_version"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check-version.outputs.up_to_date == 'false'

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.check-version.outputs.up_to_date == 'false'
        with:
          install-pandoc: false
          packages: |
            any::primarycensored

      - name: Regenerate vendored Stan functions
        if: steps.check-version.outputs.up_to_date == 'false'
        run: |
          library(primarycensored)
          stan_code <- pcd_load_stan_functions(
            functions = c(
              "primarycensored_lpmf",
              "primarycensored_ode",
              "dist_lcdf",
              "primary_lpdf"
            ),
            dependencies = TRUE
          )
          version <- as.character(packageVersion("primarycensored"))
          header <- paste0(
            "// Stan functions from primarycensored version ", version
          )
          writeLines(
            c(header, stan_code),
            "inst/stan/functions/primarycensored.stan"
          )
        shell: Rscript {0}

      - name: Create Pull Request
        if: steps.check-version.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update vendored primarycensored Stan functions
          title: Update vendored primarycensored Stan functions
          body: |
            The vendored primarycensored Stan functions are out of date
            with the latest CRAN version. This PR updates them.

            Please verify the changes before merging.
          branch: update-vendored-primarycensored
