name: stan model benchmark

on:
  workflow_dispatch:
  pull_request:
    branches: main
    paths:
      - inst/stan/**
      - .github/workflows/stan-model-benchmark.yaml
      - inst/dev/benchmark*.R

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  stan-model-benchmark:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          path: branch

      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: https://production.r-multiverse.org/2026-03-15

      - name: Install cmdstan
        uses: epinowcast/actions/install-cmdstan@v1
        with:
          cmdstan-version: 'latest'
          num-cores: 2

      # Install dependencies for both versions into separate libraries
      - name: Install main branch dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: main
          packages: |
            local::.
            here
            purrr
            primarycensored
            any::cmdstanr

      - name: Benchmark main branch (estimate_infections)
        id: benchmark-main
        continue-on-error: true
        working-directory: main
        run: |
          # Use benchmark scripts from PR branch (main may not have them)
          Rscript ../branch/inst/dev/benchmark-single.R main

      - name: Benchmark main branch (estimate_dist)
        id: benchmark-main-dist
        continue-on-error: true
        working-directory: main
        run: |
          Rscript ../branch/inst/dev/benchmark-estimate-dist.R main

      - name: Install PR branch dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: branch
          packages: |
            local::.
            primarycensored
            any::cmdstanr

      - name: Benchmark PR branch (estimate_infections)
        working-directory: branch
        run: |
          Rscript inst/dev/benchmark-single.R branch

      - name: Benchmark PR branch (estimate_dist)
        working-directory: branch
        run: |
          Rscript inst/dev/benchmark-estimate-dist.R branch

      # Compare results
      - name: Compare benchmarks (estimate_infections)
        id: compare
        if: steps.benchmark-main.outcome == 'success'
        working-directory: branch
        run: |
          Rscript inst/dev/benchmark-compare.R \
            ../main/main-profiles.csv \
            branch-profiles.csv \
            benchmark-infections.md

      - name: Compare benchmarks (estimate_dist)
        id: compare-dist
        if: steps.benchmark-main-dist.outcome == 'success'
        working-directory: branch
        run: |
          Rscript inst/dev/benchmark-compare.R \
            ../main/main-dist-profiles.csv \
            branch-dist-profiles.csv \
            benchmark-dist.md

      - name: Combine benchmark results
        working-directory: branch
        run: |
          echo "" > benchmark-results.md
          if [ -f benchmark-infections.md ]; then
            echo "## estimate_infections" >> benchmark-results.md
            echo "" >> benchmark-results.md
            cat benchmark-infections.md >> benchmark-results.md
            echo "" >> benchmark-results.md
          fi
          if [ -f benchmark-dist.md ]; then
            echo "## estimate_dist" >> benchmark-results.md
            echo "" >> benchmark-results.md
            cat benchmark-dist.md >> benchmark-results.md
            echo "" >> benchmark-results.md
          fi

      - name: Note if main benchmarks failed
        if: >-
          steps.benchmark-main.outcome == 'failure' ||
          steps.benchmark-main-dist.outcome == 'failure'
        working-directory: branch
        run: |
          if [ "${{ steps.benchmark-main.outcome }}" = "failure" ]; then
            echo "" >> benchmark-results.md
            echo "Main branch estimate_infections benchmark failed (likely due to interface changes)." >> benchmark-results.md
          fi
          if [ "${{ steps.benchmark-main-dist.outcome }}" = "failure" ]; then
            echo "" >> benchmark-results.md
            echo "Main branch estimate_dist benchmark failed (likely due to interface changes)." >> benchmark-results.md
          fi

      - id: output
        name: Output to environment variable
        if: ${{ hashFiles('branch/benchmark-results.md') != '' }}
        run: |
          echo 'BENCHMARK<<EOF' >> $GITHUB_OUTPUT
          cat branch/benchmark-results.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Post comment
        if: ${{ hashFiles('branch/benchmark-results.md') != '' }}
        uses: actions/github-script@v8
        env:
          BENCHMARK: ${{ steps.output.outputs.BENCHMARK }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: process.env.BENCHMARK
            })
